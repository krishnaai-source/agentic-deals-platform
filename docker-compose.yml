version: "3.9"

services:
  mongodb:
    build:
      context: .
      dockerfile: infra/docker/mongodb.Dockerfile
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dealsdb

  agentic-ai:
    build:
      context: .
      dockerfile: infra/docker/agentic-ai.Dockerfile
    container_name: agentic-ai
    env_file:
      - infra/config/agentic-ai.env
    depends_on:
      - mongodb
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"

  java-api:
    build:
      context: .
      dockerfile: infra/docker/java-api.Dockerfile
    container_name: java-api
    depends_on:
      - agentic-ai
    environment:
      SPRING_CONFIG_LOCATION: classpath:/application.yml
    ports:
      - "8080:8080"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    environment:
      - VLLM_MODEL=meta-llama/Meta-Llama-3-8B
    ports:
      - "8001:8001"
